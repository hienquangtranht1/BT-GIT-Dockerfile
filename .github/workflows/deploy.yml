name: Tự động Deploy lên Docker Hub

on:
  push:
    branches: [ "main" ] # Chỉ chạy khi có code đẩy lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Mượn máy ảo Ubuntu của Github để chạy

    steps:
      - name: Bước 1 - Checkout code từ Github
        uses: actions/checkout@v6.0.2

      - name: Bước 2 - Đăng nhập vào kho Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Bước 3 - Đóng gói và Đẩy Image Java Backend lên Docker Hub
        # Sử dụng Action hỗ trợ từ Marketplace (giống trong Slide gợi ý số 2)
        uses: docker/build-push-action@v7.0.0
        with:
          context: . # Tìm Dockerfile gốc của thẻ Java
          push: true
          tags: hienquang/duanjava:v1, hienquang/duanjava:latest

      - name: Bước 4 - Đóng gói và Đẩy Image Nginx Frontend lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./cv-profile # Tìm Dockerfile trong thư mục cv-profile
          file: ./cv-profile/Dockerfile
          push: true
          tags: hienquang/duanfrontend:v1, hienquang/duanfrontend:latest
